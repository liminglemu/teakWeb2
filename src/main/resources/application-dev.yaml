server:
  port: 8001
  address: 0.0.0.0
  tomcat:
    threads:
      min-spare: 10
      max: 200

spring:
  main:
    lazy-initialization: true # 启用懒加载
  aop:
    proxy-target-class: true # 使用CGLib代理（Spring 3.x+推荐）
  datasource:
    username: root
    password: Root@123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/MySqlDB?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20 # 最大连接数
      leak-detection-threshold: 5000 # 检测泄露时间
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  session:
    jdbc:
      initialize-schema: never # 使用Flyway管理表结构
  data:
    redis:
      host: localhost
      port: 6379
      password: Redis@123456
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms
  cache:
    redis:
      cache-null-values: false # 是否缓存空值
      time-to-live: 3600000 # 默认缓存过期时间
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated  # 消息确认模式
    publisher-returns: true            # 开启消息退回
    listener:
      simple:
        acknowledge-mode: manual       # 手动确认
        concurrency: 3                 # 并发消费者数量
        max-concurrency: 10

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    default-executor-type: reuse # 重用预处理语句
    cache-enabled: true
    local-cache-scope: session

# 阿里云OSS配置
oss.endpoint: oss-cn-beijing.aliyuncs.com
oss.bucketName: dashijian
oss.expireSeconds: 360000

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Spring Boot Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    enable:
      jvm:
        memory:
          used: true
